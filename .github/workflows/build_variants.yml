name: 5. Build Variants (normal / left / right)
run-name: ${{ inputs.phase }} · variants from ${{ inputs.source_ref || github.ref_name }}

# Drives the three side-by-side apps (normal / left / right) through one phase at
# a time. Each matrix job writes xDrip/xDripOverride.xcconfig for its variant and
# sets XDRIP_BUNDLE_ID_SUFFIX so the (variant-aware) Fastlane lanes target the
# right bundle identifiers. App groups are left untouched, so all three share one
# Loop/Trio container.
#
# Recommended order (run the workflow once per phase):
#   1. phase = identifiers  -> creates the bundle IDs for each variant (via the API key)
#   2. (manual, once) in App Store Connect create an app record for each variant's
#      main app, and tick your existing Loop/Trio app groups onto the new
#      left/right bundle IDs. Neither app-record creation nor app-group attach is
#      reliably automatable with API-key-only auth. Normal is already set up from
#      prior builds.
#   3. phase = build        -> builds each variant and uploads to its TestFlight app

on:
  workflow_dispatch:
    inputs:
      phase:
        description: Which phase to run for all three variants
        type: choice
        default: build
        options:
          - identifiers
          - certificates
          - build
      source_ref:
        description: Branch or commit SHA to build (defaults to the branch this is run on)
        required: false
        default: ""
      variants:
        description: Comma-separated subset to run (e.g. "left,right"); blank = all
        required: false
        default: ""
  # TEMP: build all variants on push to this branch (diagnostic build). Remove after.
  push:
    branches:
      - update/master-6.3.3

concurrency:
  group: build-variants-${{ inputs.phase }}
  cancel-in-progress: false

jobs:
  variants:
    name: ${{ inputs.phase }} · ${{ matrix.variant }}
    runs-on: macos-15
    permissions:
      contents: write
    strategy:
      fail-fast: false
      # Serialize variants: every job reads/writes the SAME Match-Secrets git repo,
      # so running them in parallel makes their pushes clobber each other (only the
      # last variant's provisioning profiles survive). One at a time is correct.
      max-parallel: 1
      matrix:
        include:
          - variant: normal
            suffix: ""
            app_name: ""
          - variant: left
            suffix: ".left"
            app_name: "xDrip L"
          - variant: right
            suffix: ".right"
            app_name: "xDrip R"
    steps:
      - name: Skip if not in requested subset
        id: gate
        run: |
          WANT="${{ inputs.variants }}"
          if [ -z "$WANT" ] || printf '%s' ",$WANT," | grep -q ",${{ matrix.variant }},"; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping ${{ matrix.variant }} (not in '$WANT')"
          fi

      - name: Select Xcode version
        if: steps.gate.outputs.run == 'true'
        # Apple requires the iOS 26 SDK (Xcode 26+) for TestFlight uploads, so pick
        # the newest Xcode 26.x on the runner (fall back to the newest available).
        run: |
          XC=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XC" ]; then XC=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1); fi
          echo "Selecting $XC"
          sudo xcode-select -s "$XC/Contents/Developer"
          xcodebuild -version

      - name: Resolve source ref
        if: steps.gate.outputs.run == 'true'
        id: src
        run: |
          REF="${{ inputs.source_ref }}"
          if [ -z "$REF" ]; then REF="${{ github.ref_name }}"; fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.src.outputs.ref }}
          token: ${{ secrets.GH_PAT }}
          submodules: recursive

      - name: Write variant override (xDrip/xDripOverride.xcconfig)
        if: steps.gate.outputs.run == 'true'
        env:
          TEAM: ${{ secrets.TEAMID }}
          SUFFIX: ${{ matrix.suffix }}
          APP_NAME: ${{ matrix.app_name }}
        run: |
          FILE="xDrip/xDripOverride.xcconfig"
          {
            echo "// Generated by build_variants.yml for the '${{ matrix.variant }}' variant."
            if [ -n "$TEAM" ]; then
              echo "XDRIP_DEVELOPMENT_TEAM = ${TEAM}"
              echo "DEVELOPMENT_TEAM = ${TEAM}"
            fi
            if [ -n "$SUFFIX" ]; then
              echo "MAIN_APP_BUNDLE_IDENTIFIER = com.\$(DEVELOPMENT_TEAM).xdripswift${SUFFIX}"
            fi
            if [ -n "$APP_NAME" ]; then
              echo "MAIN_APP_DISPLAY_NAME = ${APP_NAME}"
            fi
          } > "$FILE"
          echo "----- ${FILE} -----"; cat "$FILE"

      - name: Patch Match Tables
        if: steps.gate.outputs.run == 'true'
        run: find /usr/local/lib/ruby/gems -name table_printer.rb | xargs sed -i "" "/puts(Terminal::Table.new(params))/d"

      - name: Install Project Dependencies
        if: steps.gate.outputs.run == 'true'
        run: bundle install

      - name: Sync clock
        if: steps.gate.outputs.run == 'true'
        run: sudo sntp -sS time.windows.com

      - name: Run Fastlane phase
        if: steps.gate.outputs.run == 'true'
        env:
          TEAMID: ${{ secrets.TEAMID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          FASTLANE_KEY_ID: ${{ secrets.FASTLANE_KEY_ID }}
          FASTLANE_ISSUER_ID: ${{ secrets.FASTLANE_ISSUER_ID }}
          FASTLANE_KEY: ${{ secrets.FASTLANE_KEY }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          XDRIP_BUNDLE_ID_SUFFIX: ${{ matrix.suffix }}
        run: |
          set -e
          PHASE="${{ inputs.phase }}"
          [ -z "$PHASE" ] && PHASE="build"
          case "$PHASE" in
            identifiers)  bundle exec fastlane identifiers ;;
            certificates) bundle exec fastlane certs ;;
            build)
              bundle exec fastlane build_xdrip4ios
              bundle exec fastlane release
              ;;
          esac

      - name: Upload build artifacts
        if: steps.gate.outputs.run == 'true' && always() && inputs.phase == 'build'
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.variant }}
          path: |
            artifacts
            buildlog
